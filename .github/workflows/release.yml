# Publishes a GitHub Release whenever a tag matching v*.*.* is pushed.
#
# What it does:
#   1. Lints bin/kafka-cli with shellcheck (fails the release if linting fails).
#   2. Computes the SHA-256 of bin/kafka-cli.
#   3. Extracts the matching section from CHANGELOG.md as release notes.
#   4. Creates the GitHub Release with:
#        - bin/kafka-cli         (the downloadable script)
#        - bin/kafka-cli.sha256  (sha256sum -c compatible checksum file)
#        - release notes = changelog section + verify-download snippet
#
# To cut a release:   git tag -a v1.0.0 -m "…"   &&   git push origin v1.0.0

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint script
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck bin/kafka-cli

      - name: Compute SHA-256
        id: hash
        run: |
          cd bin
          sha256sum kafka-cli > kafka-cli.sha256
          echo "sum=$(cut -d' ' -f1 kafka-cli.sha256)" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ steps.hash.outputs.sum }}
        run: |
          VERSION="${REF_NAME#v}"
          awk -v ver="$VERSION" '
              $0 ~ "^## \\["ver"\\]" { printing=1; next }
              printing && /^## \[/    { exit }
              printing                { print }
          ' CHANGELOG.md > release-notes.md

          cat >> release-notes.md <<EOF

          ---

          ### Verify download

          \`\`\`bash
          sha256sum ~/.local/bin/kafka-cli
          # expected: $SHA
          \`\`\`
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$REF_NAME" \
              --title "$REF_NAME" \
              --notes-file release-notes.md \
              bin/kafka-cli \
              bin/kafka-cli.sha256

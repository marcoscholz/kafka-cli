# Cut a release by pushing a tag matching v*.*.*:
#
#   git tag -a v1.0.2 -m "..." && git push origin v1.0.2
#
# Or via GitHub: Tags page → New tag. **Do not** use Releases → New
# release: that publishes the release immediately, which makes it
# immutable (if the repo ruleset is set), at which point this workflow
# can't attach assets to it.
#
# Flow:
#   1. Lint bin/kafka-cli (defence-in-depth — PR gate already ran it).
#   2. Compute SHA-256 of the script.
#   3. Extract the matching section from CHANGELOG.md.
#   4. Create a DRAFT release with the script + .sha256 attached.
#      Drafts remain mutable under the immutable-releases ruleset, so
#      the uploads are free to land.
#   5. Publish the draft (this is the transition to immutable).

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # required to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint script
        run: shellcheck bin/kafka-cli

      - name: Compute SHA-256
        id: hash
        run: |
          cd bin
          sha256sum kafka-cli > kafka-cli.sha256
          echo "sum=$(cut -d' ' -f1 kafka-cli.sha256)" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.hash.outputs.sum }}
        run: |
          VERSION="${TAG#v}"
          # Literal-string match via index() avoids regex metachars in $VERSION.
          awk -v header="## [$VERSION]" '
              index($0, header) == 1   { printing=1; next }
              printing && /^## \[/     { exit }
              printing                 { print }
          ' CHANGELOG.md > release-notes.md

          [[ -s release-notes.md ]] \
              || { echo "ERROR: CHANGELOG section for $VERSION not found." >&2; exit 1; }

          cat >> release-notes.md <<EOF

          ---

          ### Verify download

          \`\`\`bash
          sha256sum ~/.local/bin/kafka-cli
          # expected: $SHA
          \`\`\`
          EOF

      - name: Create draft release with assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes-file release-notes.md \
              bin/kafka-cli \
              bin/kafka-cli.sha256

      - name: Publish release (transitions to immutable)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false
